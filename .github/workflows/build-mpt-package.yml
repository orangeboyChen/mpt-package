name: Build mpt-package

on:
  schedule:
    # 03:35 Asia/Shanghai every day.
    - cron: "35 19 * * *"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to build, for example 2.13.10 or v2.13.10. Empty means latest v2 tag."
        required: false
        type: string
      force:
        description: "Rebuild even when the target image tag already exists."
        default: false
        required: false
        type: boolean
      push_latest:
        description: "Also update the latest tag. Scheduled builds always update latest."
        default: false
        required: false
        type: boolean

permissions:
  contents: read
  packages: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event.inputs.version || 'latest-v2' }}
  cancel-in-progress: false

env:
  PACKAGE_NAME: mpt-package

jobs:
  prepare:
    name: Resolve Version
    runs-on: ubuntu-latest
    outputs:
      commit: ${{ steps.resolve.outputs.commit }}
      version: ${{ steps.resolve.outputs.version }}
      registry_image: ${{ steps.resolve.outputs.registry_image }}
      should_build: ${{ steps.resolve.outputs.should_build == 'false' && 'false' || steps.check.outputs.should_build }}
      push_latest: ${{ steps.resolve.outputs.push_latest }}
    steps:
      - name: Resolve upstream repository and version
        id: resolve
        env:
          INPUT_VERSION: ${{ github.event.inputs.version }}
          INPUT_PUSH_LATEST: ${{ github.event.inputs.push_latest }}
          UPSTREAM_REPO: ${{ secrets.UPSTREAM_REPO }}
          GITHUB_OWNER: ${{ github.repository_owner }}
        run: |
          set -euo pipefail

          if [ -z "${UPSTREAM_REPO:-}" ]; then
            echo "Secret UPSTREAM_REPO is not set; skipping build"
            echo "should_build=false" >> "$GITHUB_OUTPUT"
            echo "push_latest=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ "${UPSTREAM_REPO}" == */* ]]; then
            upstream_repository="${UPSTREAM_REPO}"
          else
            upstream_repository="${GITHUB_OWNER}/${UPSTREAM_REPO}"
          fi

          if [ -n "${INPUT_VERSION:-}" ]; then
            tag="${INPUT_VERSION#refs/tags/}"
            tag="${tag#v}"
            tag="v${tag}"
          else
            tag="$(
              git ls-remote --tags --refs "https://github.com/${upstream_repository}.git" 'refs/tags/v*' |
                awk '{print $2}' |
                sed 's#refs/tags/##' |
                grep -E '^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9]+)?$' |
                sort -V |
                tail -n 1
            )"
          fi

          if [ -z "$tag" ]; then
            echo "No v2 version tag found in ${upstream_repository}" >&2
            exit 1
          fi

          if ! git ls-remote --exit-code --tags "https://github.com/${upstream_repository}.git" "refs/tags/${tag}" >/dev/null; then
            echo "Upstream repository ${upstream_repository} does not have ${tag}" >&2
            exit 1
          fi

          commit="$(
            git ls-remote --tags "https://github.com/${upstream_repository}.git" "refs/tags/${tag}^{}" |
              awk '{print $1}' |
              head -n 1
          )"

          if [ -z "$commit" ]; then
            commit="$(
              git ls-remote --tags "https://github.com/${upstream_repository}.git" "refs/tags/${tag}" |
                awk '{print $1}' |
                head -n 1
            )"
          fi

          if [ -z "$commit" ]; then
            echo "Unable to resolve commit for ${upstream_repository}@${tag}" >&2
            exit 1
          fi

          version="${tag#v}"
          registry_owner="$(printf '%s' "${GITHUB_OWNER}" | tr '[:upper:]' '[:lower:]')"

          echo "commit=${commit}" >> "$GITHUB_OUTPUT"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "registry_image=ghcr.io/${registry_owner}/${PACKAGE_NAME}" >> "$GITHUB_OUTPUT"
          echo "should_build=true" >> "$GITHUB_OUTPUT"

          if [ "${{ github.event_name }}" = "schedule" ] || [ "${INPUT_PUSH_LATEST:-false}" = "true" ]; then
            echo "push_latest=true" >> "$GITHUB_OUTPUT"
          else
            echo "push_latest=false" >> "$GITHUB_OUTPUT"
          fi

          echo "Resolved ${upstream_repository}@${tag} to ${commit}"

      - name: Log in to GHCR
        if: steps.resolve.outputs.should_build == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        if: steps.resolve.outputs.should_build == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Check target image tag
        id: check
        if: steps.resolve.outputs.should_build == 'true'
        env:
          FORCE: ${{ github.event.inputs.force }}
          REGISTRY_IMAGE: ${{ steps.resolve.outputs.registry_image }}
          VERSION: ${{ steps.resolve.outputs.version }}
        run: |
          set -euo pipefail

          if [ "${FORCE:-false}" = "true" ]; then
            echo "should_build=true" >> "$GITHUB_OUTPUT"
            echo "Force rebuild requested"
            exit 0
          fi

          if docker buildx imagetools inspect "${REGISTRY_IMAGE}:${VERSION}" >/dev/null 2>&1; then
            echo "should_build=false" >> "$GITHUB_OUTPUT"
            echo "${REGISTRY_IMAGE}:${VERSION} already exists; skipping build"
          else
            echo "should_build=true" >> "$GITHUB_OUTPUT"
            echo "${REGISTRY_IMAGE}:${VERSION} does not exist; building"
          fi

  build:
    name: Build and Push
    needs: prepare
    if: needs.prepare.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout automation repository
        uses: actions/checkout@v4
        with:
          path: automation
          ref: main

      - name: Resolve source repository
        id: source
        env:
          UPSTREAM_REPO: ${{ secrets.UPSTREAM_REPO }}
          GITHUB_OWNER: ${{ github.repository_owner }}
        run: |
          set -euo pipefail

          if [ -z "${UPSTREAM_REPO:-}" ]; then
            echo "Secret UPSTREAM_REPO is not set" >&2
            exit 1
          fi

          if [[ "${UPSTREAM_REPO}" == */* ]]; then
            repository="${UPSTREAM_REPO}"
          else
            repository="${GITHUB_OWNER}/${UPSTREAM_REPO}"
          fi

          echo "repository=${repository}" >> "$GITHUB_OUTPUT"

      - name: Checkout source repository
        uses: actions/checkout@v4
        with:
          repository: ${{ steps.source.outputs.repository }}
          ref: ${{ needs.prepare.outputs.commit }}
          path: source
          fetch-depth: 0
          fetch-tags: true

      - name: Apply local patch files
        working-directory: source
        run: |
          set -euo pipefail
          shopt -s nullglob

          patches=(../automation/patches/*.patch ../automation/patches/*.sh)
          if [ "${#patches[@]}" -eq 0 ]; then
            echo "No patch files found"
            exit 0
          fi

          for patch in "${patches[@]}"; do
            case "$patch" in
              *.patch)
                echo "Applying ${patch}"
                git apply --3way --check "$patch"
                git apply --3way "$patch"
                ;;
              *.sh)
                echo "Running ${patch}"
                bash "$patch"
                ;;
            esac
          done

      - name: Resolve build variables
        id: vars
        working-directory: source
        run: |
          set -euo pipefail
          echo "sha_short=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          app_version="$(sed -n "s/^APP_VERSION\s*=\s*'v\(.*\)'/\1/p" version.py)"
          if [ -n "$app_version" ]; then
            echo "app_version=${app_version}" >> "$GITHUB_OUTPUT"
          else
            echo "app_version=${{ needs.prepare.outputs.version }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ needs.prepare.outputs.registry_image }}
          tags: |
            type=raw,value=${{ needs.prepare.outputs.version }}
            type=raw,value=sha-${{ steps.vars.outputs.sha_short }}
            type=raw,value=latest,enable=${{ needs.prepare.outputs.push_latest == 'true' }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ steps.source.outputs.repository }}
            org.opencontainers.image.revision=${{ needs.prepare.outputs.commit }}
            org.opencontainers.image.version=${{ steps.vars.outputs.app_version }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: source
          file: source/docker/Dockerfile
          platforms: |
            linux/amd64
            linux/arm64/v8
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=mpt-package-docker,version=2
          cache-to: type=gha,scope=mpt-package-docker,mode=max,version=2
